aid: buildots
name: Buildots
description: >-
  Buildots is an AI-powered construction intelligence platform headquartered in
  Tel Aviv, Israel, with offices in London and the United States. The company
  combines 360-degree hardhat-mounted cameras with computer vision and machine
  learning models that automatically capture, locate, and classify on-site
  construction progress against the project BIM model and schedule, producing
  trade-level performance data, deviation and delay detection, and
  portfolio-wide analytics for general contractors, project teams, executives,
  and owners. Buildots reports that projects using the platform together with a
  performance-driven operating approach have reduced delays by up to 50%. The
  product family includes Buildots (the AI construction intelligence platform),
  Genda (workforce intelligence), and a fully managed Capture Services
  operation that handles routine site capture for customers. Verticals served
  include data centers, commercial, multifamily, healthcare, industrial,
  education, and airports. Notable customers shown on the website include
  Intel, Mortenson, JE Dunn, Turner, Wates, and STO. Buildots was founded in
  2018 and is led by CEO and co-founder Roy Danon with co-founders Aviv
  Leibovici (CPO) and Yakir Sudry (CCO). Investors include Lightspeed Venture
  Partners, Future Energy Ventures, Viola Ventures, TLV Partners, OG Ventures,
  and Tencent. Buildots does not publish a public developer API, SDK, or
  developer portal; integrations with construction software (e.g., Procore,
  Autodesk Construction Cloud) are arranged directly through the company.
