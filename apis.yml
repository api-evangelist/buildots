features:
  - name: 360-Degree Hardhat Capture
    description: >-
      Site personnel wear a 360-degree camera mounted on a hardhat and walk the
      site on a routine cadence, automatically capturing imagery across every
      floor and area without disrupting their normal site walks.
  - name: AI Computer Vision Progress Tracking
    description: >-
      Buildots' computer vision and ML models locate captured imagery against
      the floor plan, identify trade-level work in place, and compare it to
      the BIM model and project schedule to quantify progress automatically.
  - name: BIM and Schedule Integration
    description: >-
      The platform ingests the project BIM model and construction schedule and
      uses them as the ground truth against which captured progress is
      measured, surfacing deviations and delays per trade and per area.
  - name: Trade-Level Performance Analytics
    description: >-
      Buildots reports installed quantities and productivity per trade,
      enabling project teams and executives to track performance, manage
      subcontractors, and validate payment applications against actual work
      in place.
  - name: Delay and Risk Detection
    description: >-
      AI models flag schedule slippage, sequencing issues, and high-risk areas
      early so project leaders can intervene before delays compound across
      downstream trades.
  - name: Deviation Detection
    description: >-
      The system highlights installed work that deviates from the BIM model
      so quality, MEP coordination, and design-intent issues can be resolved
      while crews are still on site.
  - name: Portfolio-Wide Dashboards
    description: >-
      Executives and operating-group leaders get cross-project dashboards
      that aggregate performance, risk, and progress across an entire
      portfolio, not just a single job.
  - name: Genda Workforce Intelligence
    description: >-
      The Genda offering captures and analyzes workforce presence and
      productivity on site, providing labor analytics that complement the
      progress data from the core Buildots platform.
  - name: Capture Services
    description: >-
      A fully managed service in which Buildots personnel perform the routine
      site captures on behalf of the customer, so general contractors get
      construction intelligence without having to staff the capture workflow
      themselves.
useCases:
  - name: Trade Management
    description: >-
      Track subcontractor performance against the schedule per trade and per
      area, identify under-performing crews early, and run data-backed
      conversations with trade partners.
  - name: Delay Risk Mitigation
    description: >-
      Detect schedule risk weeks in advance using AI-derived productivity
      and pace data, and trigger mitigation actions before downstream trades
      are impacted.
  - name: Deviation Detection
    description: >-
      Compare installed work to the BIM model to surface MEP clashes,
      misplaced installations, and design-intent deviations while they are
      still inexpensive to fix.
  - name: Site Documentation
    description: >-
      Maintain a continuously updated 360-degree visual record of every floor
      and area for as-built documentation, dispute resolution, and remote
      stakeholder review.
  - name: Progress Reporting
    description: >-
      Generate consistent, AI-quantified progress reports that replace
      subjective field walks with objective installed-quantity data per
      trade and per area.
  - name: Payment Applications
    description: >-
      Validate subcontractor pay applications against measured installed
      quantities, reducing over-billing disputes and accelerating accurate
      payment cycles.
solutions:
  - name: Project Teams
    description: >-
      Field and project-management teams get an objective, AI-quantified
      view of progress, deviations, and risks across every floor and area
      they manage.
  - name: Executives
    description: >-
      General-contractor executives get portfolio-level visibility into
      performance, schedule risk, and operational excellence across every
      active job.
  - name: Owners
    description: >-
      Owners and developers get independent visibility into project pace,
      installed quantities, and risk on the assets they are funding.
  - name: CM Services
    description: >-
      Construction managers use Buildots to oversee general contractors and
      trades on the owner's behalf with objective progress and quality data.
  - name: Multifamily
    description: >-
      Track repetitive multifamily units floor by floor and unit by unit,
      flagging deviations and pace issues per stack.
  - name: Data Centers
    description: >-
      Accelerate time-to-capacity for data-center builds by tracking MEP,
      structural, and fit-out progress against aggressive schedules.
  - name: Industrial
    description: >-
      Bring industrial and manufacturing capacity online on time by
      quantifying installed work against the project schedule and BIM model.
  - name: Healthcare
    description: >-
      Manage the complexity of healthcare construction with trade-level
      progress and deviation data across mechanical, electrical, plumbing,
      and medical-gas systems.
  - name: Commercial
    description: >-
      Track commercial fit-out and core-and-shell work against schedule and
      BIM model with consistent, objective data.
  - name: Education
    description: >-
      Deliver education projects on tight academic calendars by detecting
      schedule risk early and managing trades against measured progress.
  - name: Airports
    description: >-
      Manage large, phased airport projects with portfolio dashboards and
      trade-level progress data tailored to multi-stakeholder delivery.
integrations:
  - name: BIM Models
    description: >-
      Ingests project BIM models (e.g., from Autodesk Revit / Navisworks
      workflows) as the reference model against which captured imagery is
      compared.
  - name: Project Schedules
    description: >-
      Integrates with the project schedule (e.g., Primavera P6, Microsoft
      Project) to align measured progress with planned activities and
      surface schedule risk.
  - name: 360-Degree Cameras
    description: >-
      Captures imagery from 360-degree action-camera class hardware mounted
      to the operator's hardhat during routine site walks.
