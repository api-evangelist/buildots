aid: buildots
name: Buildots
description: >-
  Buildots is an AI-powered construction intelligence platform headquartered in
  Tel Aviv, Israel with operations in London and the United States. The
  platform combines 360-degree hardhat-mounted cameras with computer vision and
  AI models to automatically capture, locate, and classify construction
  progress against BIM models and project schedules, producing trade-level
  performance data, risk and delay detection, and portfolio-wide analytics for
  general contractors, project teams, executives, and owners. Buildots reports
  that projects using its platform together with a performance-driven approach
  have reduced delays by up to 50%. The company markets three offerings:
  Buildots (the AI construction intelligence platform), Genda (workforce
  intelligence), and a fully managed Capture Services operation. Verticals
  served include data centers, commercial, multifamily, healthcare, industrial,
  education, and airports. Notable customers shown on the website include
  Intel, Mortenson, JE Dunn, Turner, Wates, and STO. Buildots is led by CEO and
  co-founder Roy Danon with co-founders Aviv Leibovici (CPO) and Yakir Sudry
  (CCO). Investors include Lightspeed Venture Partners, Future Energy Ventures,
  Viola Ventures, TLV Partners, OG Ventures, and Tencent. Buildots does not
  publish a public developer API; integrations with construction software
  (e.g., Procore, Autodesk Construction Cloud) are managed through the company
  directly.
